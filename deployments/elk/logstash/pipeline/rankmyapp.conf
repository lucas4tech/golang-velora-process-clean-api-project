input {
  gelf {
    port => 12201
    tags => ["gelf", "docker"]
  }
}

filter {
  ruby {
    code => '
      sm = event.get("short_message")
      m = event.get("message")
      raw = (sm && sm.to_s.strip != "") ? sm : m
      event.set("[event][original]", raw) if raw && raw.to_s.strip != ""
    '
  }

  if [short_message] =~ /^\s*\{/ {
    json {
      source              => "short_message"
      target              => "zap"
      skip_on_invalid_json => true
      ecs_compatibility   => v8
    }
  }
  if ![zap][level] and [message] =~ /^\s*\{/ {
    json {
      source              => "message"
      target              => "zap"
      skip_on_invalid_json => true
      ecs_compatibility   => v8
    }
  }

  if [zap][ts] {
    ruby {
      code => '
        t = event.get("[zap][ts]")
        event.set("@timestamp", LogStash::Timestamp.new(Time.at(t.to_f))) if t
      '
    }
    mutate { remove_field => ["[zap][ts]"] }
  }

  if [zap][caller] {
    grok {
      match             => { "[zap][caller]" => "%{GREEDYDATA:[log][origin][file][name]}:%{INT:[log][origin][file][line]}" }
      tag_on_failure    => ["_caller_parse_failure"]
      ecs_compatibility => v8
    }
    mutate { remove_field => ["[zap][caller]"] }
  }

  if [zap][latency] {
    ruby {
      code => '
        lat = event.get("[zap][latency]")
        event.set("[event][duration]", (lat.to_f * 1_000_000_000).to_i) if lat
      '
    }
    mutate { remove_field => ["[zap][latency]"] }
  }

  if [zap][level] {
    mutate { rename => { "[zap][level]" => "[log][level]" } }
  }
  if [zap][msg] {
    mutate { rename => { "[zap][msg]" => "message" } }
  }

  if [zap][status] {
    mutate { rename => { "[zap][status]" => "[http][response][status_code]" } }
  }
  if [zap][method] {
    mutate { rename => { "[zap][method]" => "[http][request][method]" } }
  }
  if [zap][path] {
    mutate { rename => { "[zap][path]" => "[url][path]" } }
  }
  if [zap][query] {
    mutate { rename => { "[zap][query]" => "[url][query]" } }
  }
  if [zap][ip] {
    mutate { rename => { "[zap][ip]" => "[source][ip]" } }
  }

  if [zap][stacktrace] {
    mutate { rename => { "[zap][stacktrace]" => "[error][stack_trace]" } }
  }
  if [zap][error] and ![error][message] {
    mutate { rename => { "[zap][error]" => "[error][message]" } }
  }

  if [zap] {
    ruby {
      code => '
        z = event.get("zap")
        if z.is_a?(Hash) && z.any?
          z.each do |k, v|
            next if v.nil?
            event.set("[rankmyapp][#{k}]", v)
          end
        end
        event.remove("zap")
      '
    }
  }

  mutate {
    add_field => {
      "[event][dataset]" => "rankmyapp.application"
      "ecs.version"      => "8.11.0"
    }
    rename => { "container_name" => "[container][name]" }
    remove_field => ["short_message"]
  }

  if [image_name] {
    mutate { rename => { "image_name" => "[container][image][name]" } }
  }
  if [container_id] {
    mutate { rename => { "container_id" => "[container][id]" } }
  }

  if [tag] {
    mutate { add_field => { "[service][name]" => "%{tag}" } }
  }

  if [source][ip] {
    geoip {
      source              => "[source][ip]"
      target              => "source"
      ecs_compatibility   => v8
    }
  }

  if [http][request][method] {
    ruby {
      code => '
        event.set("[event][kind]", "event")
        event.set("[event][type]", ["access"])
        event.set("[event][category]", ["web"])
        sc = event.get("[http][response][status_code]")
        if sc.nil?
          event.set("[event][outcome]", "unknown")
        elsif sc.to_i < 400
          event.set("[event][outcome]", "success")
        else
          event.set("[event][outcome]", "failure")
        end
      '
    }
  }

  if ![http][request][method] and ([log][level] == "error" or [error][message]) {
    ruby {
      code => '
        event.set("[event][kind]", "event")
        event.set("[event][category]", ["process"])
        event.set("[event][type]", ["error"])
        event.set("[event][outcome]", "failure")
      '
    }
  }

  mutate {
    add_field => {
      "[observer][type]"   => "logstash"
      "[observer][vendor]" => "elastic"
      "[observer][name]"   => "rankmyapp-logstash"
    }
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "rankmyapp-logs-%{+YYYY.MM.dd}"
    ssl_enabled => false
  }
}
