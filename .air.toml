root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api"
bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html"]
include_dir = ["cmd", "configs", "internal", "pkg", "docs"]
exclude_dir = ["tmp", "vendor", "test", ".git", ".gomodcache", ".gocache", "bin"]
exclude_file = []
delay = 800
stop_on_error = true
# Sem `log` em ficheiro: saída vai para stdout/stderr → visível em `docker compose logs -f api`.
